<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamWorld AI - Gemini Edition</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, #050505, #111);
            color: white; font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .card {
            text-align: center; padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px; width: 90%;
        }

        h1 { font-size: 1.8rem; color: #4facfe; margin-bottom: 20px; }

        input {
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            margin-bottom: 20px; background: rgba(255, 255, 255, 0.9);
            box-sizing: border-box; font-size: 1rem;
        }

        button {
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            background: #4facfe; color: white; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }

        button:hover { background: #00f2fe; transform: translateY(-2px); }

        #blackout {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; opacity: 0; visibility: hidden;
            z-index: 100; transition: opacity 4s ease;
            display: flex; justify-content: center; align-items: center;
        }

        #blackout.active { opacity: 1; visibility: visible; }

        .loading { display: none; margin: 10px 0; color: #4facfe; }
    </style>
</head>
<body>

    <div class="card" id="ui">
        <h1>Orzu Sayohati</h1>
        <p>Gemini AI sizni orzular olamiga olib boradi.</p>
        <input type="text" id="dreamInput" placeholder="Orzuingizni yozing...">
        <div id="loader" class="loading">AI o'ylamoqda...</div>
        <button id="startBtn" onclick="generateDream()">Sayohatni boshlash</button>
    </div>

    <div id="blackout">
        <p style="color: #333; font-style: italic; letter-spacing: 2px;">KO'ZLARINGIZNI YUMING...</p>
    </div>

    <script>
        // SIZNING GEMINI API KALITINGIZ
        const API_KEY = "AIzaSyBf1asOv0jHlSbPkzcdOwD1SELtr7PQ8N8"; 

        async function generateDream() {
            const dream = document.getElementById('dreamInput').value;
            const btn = document.getElementById('startBtn');
            const loader = document.getElementById('loader');
            const blackout = document.getElementById('blackout');

            if (!dream) return alert("Orzuingizni yozing!");

            btn.style.display = 'none';
            loader.style.display = 'block';

            try {
                // Gemini API so'rovi (v1beta)
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: `Sen sehrli yordamchisan. Foydalanuvchi orzusini aytdi: "${dream}". Uni hayotda sodir bo'layotgandek, juda chiroyli, meditatsion va sehrli tilda tasvirlab ber. Gapni "Ko'zlaringni yum, chuqur nafas ol..." deb boshla. O'zbek tilida yoz.` }]
                        }]
                    })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;

                // Vizual effekt
                document.getElementById('ui').style.opacity = '0';
                setTimeout(() => {
                    blackout.classList.add('active');
                    speak(aiText);
                }, 1000);

            } catch (error) {
                console.error(error);
                alert("Xatolik yuz berdi. Kalit yoki internetni tekshiring.");
                btn.style.display = 'block';
                loader.style.display = 'none';
            }
        }

        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'uz-UZ';
            utter.rate = 0.8;
            
            synth.speak(utter);

            utter.onend = () => {
                setTimeout(() => {
                    document.getElementById('blackout').classList.remove('active');
                    document.getElementById('ui').style.opacity = '1';
                    document.getElementById('startBtn').style.display = 'block';
                    document.getElementById('loader').style.display = 'none';
                }, 2000);
            };
        }
    </script>
</body>
</html>
