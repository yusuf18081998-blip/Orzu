<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamWorld AI - Sizning Virtual Orzuingiz</title>
    <style>
        :root {
            --primary-color: #00f2fe;
            --accent-color: #4facfe;
            --bg-dark: #09090b;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        /* Orqa fondagi harakatlanuvchi tuman */
        .fog-bg {
            position: fixed;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #09090b 100%);
            z-index: -1;
        }

        .main-wrapper {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: filter 2s ease, opacity 2s ease;
        }

        .content-card {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            backdrop-filter: blur(20px);
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p { color: #a1a1aa; margin-bottom: 30px; line-height: 1.6; }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 18px 25px;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
        }

        button {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(45deg, var(--accent-color), var(--primary-color));
            color: #000;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(79, 172, 254, 0.4);
        }

        /* Gipersayohat (Ko'zni yumgan holat) */
        #dream-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            z-index: 100;
            transition: opacity 5s ease;
        }

        #dream-layer.active {
            opacity: 1;
            visibility: visible;
        }

        .dream-text {
            color: #444;
            font-size: 1.2rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .loading-dots { display: none; margin-top: 15px; }
        .loading-dots span {
            display: inline-block;
            width: 8px; height: 8px;
            background: var(--primary-color);
            border-radius: 50%;
            margin: 0 3px;
            animation: bounce 0.6s infinite alternate;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce { to { transform: translateY(-10px); opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="fog-bg"></div>

    <div class="main-wrapper" id="main-ui">
        <div class="content-card">
            <h1>DreamWorld AI</h1>
            <p>Hozirgi dunyodan uziling. Orzuingizni yozing va biz sizni o'sha yerga olib boramiz.</p>
            
            <div class="input-group">
                <input type="text" id="userDream" placeholder="Orzuingizni batafsil tasvirlang..." autocomplete="off">
            </div>

            <button id="actionBtn" onclick="launchExperience()">Sayohatni boshlash</button>
            
            <div id="loader" class="loading-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <div id="dream-layer">
        <div class="dream-text">Hozir ko'zlaringizni yuming...</div>
    </div>

    <script>
        const API_KEY = "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";

        async function launchExperience() {
            const dreamInput = document.getElementById('userDream');
            const btn = document.getElementById('actionBtn');
            const loader = document.getElementById('loader');
            const dreamLayer = document.getElementById('dream-layer');
            const mainUI = document.getElementById('main-ui');

            if (!dreamInput.value.trim()) {
                alert("Siz hali orzuingizni aytmadingiz-ku? :)");
                return;
            }

            // Yuklash boshlanishi
            btn.style.display = 'none';
            loader.style.display = 'block';

            try {
                // OpenAI API so'rovi
                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o",
                        messages: [
                            {
                                role: "system",
                                content: "Sen foydalanuvchini meditatsiya holatiga tushiruvchi ovozli yordamchisan. Foydalanuvchi o'z orzusini yozadi. Sen unga javoban: 'Ko'zlaringni yum, chuqur nafas ol. Hozir men aytganlarimni tasavvur qil' deb boshlab, uning orzusini 1 daqiqalik chiroyli hikoya kabi gapirib ber. Til juda sokin va sehrli bo'lsin."
                            },
                            { role: "user", content: dreamInput.value }
                        ]
                    })
                });

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;

                // Sahna o'zgarishi
                mainUI.style.opacity = '0';
                setTimeout(() => {
                    dreamLayer.classList.add('active');
                    speak(aiResponse);
                }, 1000);

            } catch (err) {
                alert("API bilan ulanishda xatolik. Kalitni yoki internetni tekshiring.");
                btn.style.display = 'block';
                loader.style.display = 'none';
            }
        }

        function speak(text) {
            const synth = window.speechSynthesis;
            const utterance = new SpeechSynthesisUtterance(text);
            
            // Ovoz sozlamalari
            utterance.lang = 'uz-UZ'; 
            utterance.pitch = 0.9; // Biroz pastroq va jiddiy ovoz
            utterance.rate = 0.8;  // Sekin va muloyim

            synth.speak(utterance);

            utterance.onend = () => {
                setTimeout(() => {
                    document.getElementById('dream-layer').classList.remove('active');
                    document.getElementById('main-ui').style.opacity = '1';
                    document.getElementById('actionBtn').style.display = 'block';
                    document.getElementById('loader').style.display = 'none';
                    alert("O'sha hisni saqlab qoling. Orzular albatta ushaladi!");
                }, 2000);
            };
        }
    </script>
</body>
</html>
